services:
  todo-rag-api:
    image: todo-rag-api
    # Only for Production server
    platform: linux/arm64
    container_name: todo-rag-api
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - todo-rag-network
      - shared_backend_net

  db:
    image: pgvector/pgvector:pg18
    platform: linux/arm64
    container_name: todo-rag-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount a script to automatically enable the extension on startup
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: todo_rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: 'UTC'
    networks:
      - todo-rag-network
      - shared_backend_net

  redis:
    image: redis/redis-stack:latest
    platform: linux/arm64
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
    environment:
      REDIS_ARGS: '--requirepass redispass'
    networks:
      - todo-rag-network
      - shared_backend_net

volumes:
  postgres_data:
  redis_data:

networks:
  # For cloudflare tunnel to access the API container
  shared_backend_net:
    external: true
  todo-rag-network:
    driver: bridge
