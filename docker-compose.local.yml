services:
  todo-rag-api:
    image: todo-rag-api
    container_name: todo-rag-api
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - '3000:3000'
    networks:
      - todo-rag-network

  db:
    image: pgvector/pgvector:pg18
    container_name: todo-rag-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount a script to automatically enable the extension on startup
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: todo_rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: 'UTC'
    ports:
      - '25432:5432'
    networks:
      - todo-rag-network

  redis:
    image: redis/redis-stack:latest
    restart: always
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
    environment:
      REDIS_ARGS: '--requirepass redispass'
    networks:
      - todo-rag-network

volumes:
  postgres_data:
  redis_data:

networks:
  todo-rag-network:
    driver: bridge
