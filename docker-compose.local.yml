  db:
    image: pgvector/pgvector:pg18
    container_name: todo-rag-postgres
    restart: always
    environment:
      POSTGRES_DB: todo_rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: 'UTC'
    ports:
      - '5432:5432'
    networks:
      - todo-rag-network

  redis:
    image: redis/redis-stack:latest
    restart: always
    ports:
      - '6379:6379'
      - '8001:8001'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
    environment:
      REDIS_ARGS: '--requirepass redispass'
    networks:
      - todo-rag-network

networks:
  todo-rag-network:
    driver: bridge
